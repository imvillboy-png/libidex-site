name: Keep Sites Awake

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  ping-sites:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Libidex Site
        run: curl -s -o /dev/null -w "%{http_code}" https://libidex-site.onrender.com || true

      - name: Ping ProMan Site
        run: curl -s -o /dev/null -w "%{http_code}" https://pro-man-o8qm.onrender.com || true

      - name: Ping API
        run: curl -s -o /dev/null -w "%{http_code}" https://libidex-site.onrender.com/api/orders.php || true
