name: Keep Sites Awake

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  ping-sites:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Libidex Site
        run: curl -s -o /dev/null -w "%{http_code}" https://libidex-site.netlify.app || true

      - name: Ping Admin Panel
        run: curl -s -o /dev/null -w "%{http_code}" https://libidex-admin.netlify.app || true

      - name: Ping Orders API
        run: curl -s -o /dev/null -w "%{http_code}" https://libidex-site.netlify.app/.netlify/functions/orders || true