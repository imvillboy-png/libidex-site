name: Keep Sites Awake

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  ping-sites:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Vercel API
        run: curl -s -o /dev/null -w "%{http_code}" https://libidex-site.vercel.app/api/orders || true

      - name: Ping Vercel Site
        run: curl -s -o /dev/null -w "%{http_code}" https://libidex-site.vercel.app || true